name: Cold Chain Data Generator

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  generate-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # STEP 1 — Generate synthetic data
      - name: Run Synthetic Generator
        run: |
          python full_synthetic_generator.py

      # STEP 2 — Agent 1
      - name: Run Sensor Validation Agent
        run: |
          python SensorValidationAgent.py

      # STEP 3 — Agent 2
      - name: Run Quality Risk Agent
        run: |
          python QualityRiskAgent.py

      # STEP 4 — Agent 3
      - name: Run Root Cause Analysis Agent
        run: |
          python RootCauseAnalysisAgent.py

      # STEP 5 — Agent 4
      - name: Run Recommendation Agent
        run: |
          python RecommendationAgent.py

      # STEP 6 — Commit results
      - name: Commit generated files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add *.xlsx
          git commit -m "Daily generated + agent outputs" || echo "No changes"
          git push
